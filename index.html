<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Stream Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="copy-dir" href="public" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
  </head>
  <body>
    <script>
      var _hlsInstance = null;
      var _hlsPreviews = {};

      function initPreview(id, url) {
        var video = document.getElementById(id);
        if (!video) return;
        if (_hlsPreviews[id]) { _hlsPreviews[id].destroy(); delete _hlsPreviews[id]; }
        if (Hls.isSupported()) {
          var hls = new Hls({ maxBufferLength: 5, maxMaxBufferLength: 10 });
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function () { video.play().catch(function () {}); });
          _hlsPreviews[id] = hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          video.play().catch(function () {});
        }
      }

      function destroyPreview(id) {
        if (_hlsPreviews[id]) { _hlsPreviews[id].destroy(); delete _hlsPreviews[id]; }
        var video = document.getElementById(id);
        if (video) { video.pause(); video.src = ''; }
      }

      function initHlsPlayer(url) {
        var video = document.getElementById('stream-video');
        if (!video) return;

        if (_hlsInstance) {
          _hlsInstance.destroy();
          _hlsInstance = null;
        }

        if (Hls.isSupported()) {
          _hlsInstance = new Hls({ enableWorker: true });
          _hlsInstance.loadSource(url);
          _hlsInstance.attachMedia(video);
          _hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play().catch(function () {});
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Native HLS (e.g. Safari)
          video.src = url;
          video.play().catch(function () {});
        }
      }

      function destroyPlayer() {
        if (_hlsInstance) {
          _hlsInstance.destroy();
          _hlsInstance = null;
        }
        var video = document.getElementById('stream-video');
        if (video) {
          video.pause();
          video.src = '';
        }
      }
    </script>
  </body>
</html>
